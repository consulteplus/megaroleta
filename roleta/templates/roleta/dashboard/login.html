{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login Admin - Roleta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'roleta/css/dashboard.css' %}">
</head>

<body class="login-body">
    <div class="login-card">
        <h2 style="text-align:center; margin-bottom: 30px; color: #000b4a;">Admin Login</h2>
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom: 8px; font-size: 14px; color: #666;">Usuário</label>
                <input type="text" name="username"
                    style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display:block; margin-bottom: 8px; font-size: 14px; color: #666;">Senha</label>
                <input type="password" name="password"
                    style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;">
            </div>
            <button type="submit"
                style="width:100%; padding:14px; background:#0022fa; color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer;">Entrar
                no Painel</button>
        </form>
    </div>
</body>

</html>
